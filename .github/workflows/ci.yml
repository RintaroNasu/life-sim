name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  api-formatter:
    name: Api Formatter Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Check Go format
        run: |
          FILES=$(gofmt -l -s .)
          if [ -n "$FILES" ]; then
            echo "These files are not formatted:"
            echo "$FILES"
            exit 1
          fi

  api-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: [api-formatter]
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

  api-test:
    name: Go Tests & Coverage
    runs-on: ubuntu-latest
    needs: [api-build]
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests with coverage
        run: |
          go test ./... -v -coverprofile=coverage.out || true
          go tool cover -func=coverage.out || true
  web-ci:
    name: Web CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
